<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Element Reminder Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#060f0c;--card:rgba(18,18,18,.65);--card-solid:#141414;
      --text:#f5efe8;--text-dim:#8a7e6e;--text-muted:#5a5548;
      --input:#1a1a1a;--border:rgba(240,194,123,.12);--border-s:rgba(255,255,255,.06);
      --gold:#f0c27b;--gold-dim:#c79a55;--gold-glow:rgba(240,194,123,.15);
      --green:#6dd4a0;--red:#e88;--blue:#5b9cf6;--orange:#f5a623;--purple:#a78bfa;
      --glass:rgba(255,255,255,.04);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--text);
      display:flex;flex-direction:column;align-items:center;position:relative;
    }

    .bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.25;animation:oF 22s ease-in-out infinite alternate}
    .orb-1{width:380px;height:380px;background:radial-gradient(circle,#18453b,transparent 70%);top:-12%;left:-14%}
    .orb-2{width:320px;height:320px;background:radial-gradient(circle,#5b3a12,transparent 70%);bottom:-8%;right:-10%;animation-delay:-8s;animation-duration:26s}
    @keyframes oF{0%{transform:translate(0,0) scale(1)}50%{transform:translate(25px,-20px) scale(1.05)}100%{transform:translate(-12px,25px) scale(.97)}}
    .noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.02;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}
    .particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
    .particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:pD linear infinite}
    @keyframes pD{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.4}90%{opacity:.25}100%{opacity:0;transform:translateY(-10vh) scale(1)}}

    .main-wrapper{position:relative;z-index:10;width:100%;max-width:460px;height:100%;display:flex;flex-direction:column;padding:0 12px}

    .tab-nav{
      display:flex;background:var(--input);padding:3px;border-radius:14px;
      margin:12px 0 10px;position:relative;flex-shrink:0;border:1px solid var(--border-s);
    }
    .tab-btn{
      flex:1;padding:11px 0;border:none;background:transparent;
      color:var(--text-dim);font-weight:600;font-size:.82rem;
      border-radius:11px;cursor:pointer;transition:all .3s;
      font-family:inherit;position:relative;z-index:2;letter-spacing:.2px;
    }
    .tab-btn.active{color:var(--gold);font-weight:700}
    .tab-slider{
      position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);
      background:rgba(240,194,123,.08);border:1px solid rgba(240,194,123,.15);
      border-radius:11px;transition:transform .35s cubic-bezier(.32,.72,0,1);z-index:1;
    }
    .tab-slider.right{transform:translateX(calc(100% + 3px))}

    .pages{flex:1;overflow:hidden;position:relative}
    .page{
      position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
      -webkit-overflow-scrolling:touch;opacity:0;transform:translateY(8px);
      transition:opacity .3s ease,transform .3s ease;pointer-events:none;padding-bottom:40px;
    }
    .page.active{opacity:1;transform:translateY(0);pointer-events:auto}
    .page::-webkit-scrollbar{width:3px}
    .page::-webkit-scrollbar-thumb{background:rgba(240,194,123,.08);border-radius:8px}

    .card{
      background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--border);border-radius:22px;padding:20px;
      box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.03);
    }

    .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .header-row h2{font-size:1.1rem;font-weight:700;letter-spacing:-.2px}
    .btn-reset{
      background:transparent;border:1px solid rgba(232,136,136,.25);color:var(--red);
      border-radius:10px;padding:6px 14px;font-size:.7rem;font-weight:700;
      cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.5px;
    }
    .btn-reset:active{transform:scale(.93);background:rgba(232,136,136,.1)}

    .day-status{
      display:flex;align-items:center;gap:6px;font-size:.72rem;font-weight:600;
      margin-bottom:16px;padding:8px 12px;border-radius:10px;
      background:rgba(109,212,160,.06);border:1px solid rgba(109,212,160,.1);color:var(--green);
    }
    .day-status.off{background:rgba(232,136,136,.06);border-color:rgba(232,136,136,.1);color:var(--red)}
    .day-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

    .pill-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
    .pill-btn{
      background:var(--glass);border:1px solid var(--border-s);color:var(--text-dim);
      padding:10px 2px;border-radius:10px;font-size:.7rem;font-weight:600;
      cursor:pointer;transition:all .15s;font-family:inherit;
    }
    .pill-btn:active{background:rgba(240,194,123,.15);color:var(--gold);border-color:var(--gold);transform:scale(.94)}

    label{display:block;font-size:.65rem;font-weight:700;margin-bottom:7px;opacity:.5;text-transform:uppercase;letter-spacing:1px;margin-top:14px}

    .std-input{
      width:100%;padding:13px 14px;border:1px solid var(--border-s);border-radius:12px;
      background:var(--input);color:var(--text);font-size:1rem;
      box-sizing:border-box;outline:none;transition:all .25s;font-family:inherit;
      -webkit-appearance:none;appearance:none;
    }
    .std-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
    input[type="date"].std-input{color-scheme:dark}

    .jumper-row{display:flex;gap:6px;margin-top:6px}
    .jumper-btn{
      flex:1;background:var(--glass);border:1px solid var(--border-s);color:var(--gold);
      padding:12px;border-radius:10px;font-size:.82rem;font-weight:700;
      cursor:pointer;transition:all .15s;font-family:inherit;
    }
    .jumper-btn:active{background:rgba(240,194,123,.12);border-color:var(--gold);transform:scale(.95)}

    /*
     * ============================================================
     *  TIME INPUT — THE KEY FIX
     *  The <input type="time"> is NOT hidden.
     *  It sits on top of the 🕒 icon with transparent text.
     *  This is the ONLY reliable way to trigger native pickers
     *  on all mobile browsers (iOS Safari, Chrome Android, etc.)
     * ============================================================
     */
    .time-hybrid{display:flex;gap:8px;align-items:stretch}
    .time-manual{
      flex:1;padding:13px 14px;border:1px solid var(--border-s);border-radius:12px;
      background:var(--input);color:var(--text);font-size:1.15rem;
      font-family:'Consolas','Menlo',monospace;letter-spacing:2px;text-align:center;
      box-sizing:border-box;outline:none;transition:all .25s;
      -webkit-appearance:none;appearance:none;
    }
    .time-manual:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
    .time-manual::placeholder{color:var(--text-muted);font-size:.9rem;letter-spacing:1px}

    /* The picker wrapper — this IS the tappable area */
    .picker-wrap{
      position:relative;
      width:52px;
      flex-shrink:0;
      border-radius:12px;
      overflow:hidden;
      border:1px solid var(--border-s);
      background:var(--input);
      transition:border-color .2s;
    }
    .picker-wrap:active{border-color:var(--gold)}

    /* 🕒 icon sits behind the input */
    .picker-icon{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.4rem;
      pointer-events:none; /* let taps pass through to the input above */
      z-index:1;
    }

    /*
     * The actual <input type="time"> — fully visible, fully tappable,
     * just with invisible text. This is the critical difference.
     * opacity:1, position:absolute over the icon, transparent color.
     */
    .picker-real{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      background:transparent;
      /* Hide the native time text but keep the element fully interactive */
      color:transparent;
      -webkit-text-fill-color:transparent;
      -webkit-appearance:none;
      appearance:none;
      z-index:2;
      cursor:pointer;
      color-scheme:dark;
      /* Prevent iOS from zooming on focus */
      font-size:16px;
      /* Remove any native decoration that might peek through */
      outline:none;
      box-shadow:none;
    }

    .time-warn{
      font-size:.7rem;color:var(--red);margin-top:6px;padding:0 2px;
      opacity:0;max-height:0;overflow:hidden;transition:all .25s;
    }
    .time-warn.show{opacity:1;max-height:30px;margin-top:8px}

    .btn-generate{
      width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));
      color:#0a1e1a;border:none;border-radius:14px;padding:16px;font-size:1.05rem;
      font-weight:800;cursor:pointer;transition:all .2s;font-family:inherit;
      box-shadow:0 4px 16px rgba(192,150,70,.25);margin-top:22px;letter-spacing:.3px;
    }
    .btn-generate:active{transform:scale(.97);box-shadow:0 2px 8px rgba(192,150,70,.15)}

    .output-section{
      margin-top:20px;border-top:1px solid var(--border-s);padding-top:16px;
      max-height:0;overflow:hidden;opacity:0;transition:max-height .4s ease,opacity .3s ease;pointer-events:none;
    }
    .output-section.active{max-height:400px;opacity:1;pointer-events:auto}
    .output-section label{margin-top:0}
    .copy-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .copy-row textarea{
      flex:1;background:rgba(0,0,0,.3);color:var(--gold);border:1px solid var(--border-s);
      border-radius:10px;padding:11px 12px;font-family:'Consolas','Menlo',monospace;
      font-size:.82rem;height:42px;resize:none;outline:none;line-height:1.4;
    }
    .btn-copy{
      background:var(--glass);border:1px solid var(--border-s);color:var(--text-dim);
      width:68px;height:42px;border-radius:10px;font-weight:700;cursor:pointer;
      font-size:.78rem;transition:all .15s;font-family:inherit;flex-shrink:0;
    }
    .btn-copy:active{background:rgba(240,194,123,.12);color:var(--gold);border-color:var(--gold);transform:scale(.93)}
    .btn-copy.copied{color:var(--green);border-color:rgba(109,212,160,.3);background:rgba(109,212,160,.08)}

    /* ======== HISTORY ======== */
    .log-section{margin-bottom:14px}
    .log-header{
      display:flex;justify-content:space-between;align-items:center;
      background:rgba(240,194,123,.04);border:1px solid var(--border);
      padding:12px 14px;border-radius:14px;margin-bottom:8px;
    }
    .log-date{font-weight:800;color:var(--gold);font-size:.88rem;letter-spacing:.2px}
    .log-date-sub{font-size:.64rem;color:var(--text-muted);font-weight:400;margin-top:1px}
    .header-actions{display:flex;gap:5px}
    .btn-sm{
      border:none;padding:6px 12px;border-radius:8px;font-size:.68rem;
      font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;
    }
    .btn-sm:active{transform:scale(.9)}
    .btn-summary{background:rgba(109,212,160,.12);color:var(--green)}
    .btn-email{background:rgba(245,166,35,.12);color:var(--orange)}

    .log-item{
      display:flex;align-items:center;padding:12px 14px;
      background:var(--glass);border:1px solid var(--border-s);
      border-radius:14px;margin-bottom:6px;transition:all .25s;
      animation:logIn .3s ease both;
    }
    @keyframes logIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    .log-item.editing{border-color:var(--gold);background:rgba(240,194,123,.04);box-shadow:0 0 20px var(--gold-glow)}
    .log-details{flex:1;min-width:0;overflow:hidden}
    .log-time{font-family:'Consolas','Menlo',monospace;font-weight:700;font-size:.88rem;color:var(--purple);margin-right:10px}
    .log-msg{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.75;font-size:.84rem}
    .log-actions{display:flex;gap:5px;flex-shrink:0;margin-left:8px}
    .btn-icon{
      width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-size:.95rem;cursor:pointer;transition:all .15s;border:1px solid var(--border-s);
      background:var(--glass);color:var(--text-dim);
    }
    .btn-icon:active{transform:scale(.85)}
    .btn-icon.resch:active{background:rgba(91,156,246,.12);color:var(--blue);border-color:rgba(91,156,246,.2)}
    .btn-icon.edit:active{background:rgba(240,194,123,.12);color:var(--gold);border-color:rgba(240,194,123,.2)}
    .btn-icon.del:active{background:rgba(232,136,136,.12);color:var(--red);border-color:rgba(232,136,136,.2)}

    .inline-edit{display:none;padding:10px 14px;background:rgba(0,0,0,.2);border-radius:12px;margin-top:8px;border:1px solid var(--border)}
    .inline-edit.active{display:block;animation:logIn .25s ease}
    .ie-row{display:flex;gap:6px;margin-bottom:6px}
    .ie-row:last-child{margin-bottom:0}
    .ie-input{
      flex:1;padding:10px 12px;border:1px solid var(--border-s);border-radius:10px;
      background:var(--input);color:var(--text);font-size:.88rem;outline:none;
      font-family:inherit;-webkit-appearance:none;transition:border-color .2s;
    }
    .ie-input:focus{border-color:var(--gold)}
    .ie-input[type="time"]{color-scheme:dark}
    .ie-actions{display:flex;gap:6px;justify-content:flex-end}
    .ie-btn{
      padding:8px 16px;border-radius:10px;font-size:.78rem;font-weight:700;
      cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit;
    }
    .ie-btn:active{transform:scale(.9)}
    .ie-save{background:rgba(109,212,160,.12);color:var(--green);border-color:rgba(109,212,160,.2)}
    .ie-cancel{background:var(--glass);color:var(--text-dim);border-color:var(--border-s)}

    .empty-log{text-align:center;color:var(--text-muted);font-size:.86rem;padding:50px 20px;line-height:1.6}
    .empty-log-icon{font-size:2.5rem;margin-bottom:10px;display:block;opacity:.3}
    .btn-clear-history{
      width:100%;padding:13px;background:transparent;
      border:1px dashed rgba(232,136,136,.2);color:var(--red);
      border-radius:14px;margin-top:16px;cursor:pointer;font-weight:700;
      font-size:.82rem;transition:all .2s;font-family:inherit;
    }
    .btn-clear-history:active{background:rgba(232,136,136,.08);transform:scale(.97)}

    .toast-box{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;width:calc(100% - 40px);max-width:400px}
    .toast{
      width:100%;background:rgba(16,16,16,.94);backdrop-filter:blur(16px);
      border:1px solid rgba(240,194,123,.2);color:var(--gold);
      padding:13px 20px;border-radius:16px;font-size:.84rem;font-weight:600;
      box-shadow:0 8px 28px rgba(0,0,0,.5);text-align:center;
      animation:tI .3s cubic-bezier(.4,0,.2,1),tO .3s ease-in 2s forwards;
      pointer-events:auto;font-family:'Inter',system-ui,sans-serif;
    }
    @keyframes tI{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes tO{from{opacity:1}to{opacity:0;transform:translateY(-8px) scale(.96)}}

    .modal-ov{
      position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;z-index:9998;
      animation:mF .2s ease-out;padding:24px;
    }
    @keyframes mF{from{opacity:0}to{opacity:1}}
    .modal-bx{
      background:var(--card-solid);border:1px solid var(--border);
      border-radius:22px;padding:30px 26px;max-width:340px;width:100%;text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,.5);animation:mP .25s cubic-bezier(.4,0,.2,1);
    }
    @keyframes mP{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-ico{font-size:2rem;margin-bottom:10px;display:block}
    .modal-bx h3{color:var(--gold);font-size:1rem;margin-bottom:6px;font-weight:700}
    .modal-bx p{color:var(--text-dim);font-size:.84rem;margin-bottom:22px;line-height:1.5}
    .modal-btns{display:flex;gap:10px}
    .mb{flex:1;padding:13px;font-size:.88rem;border-radius:14px;border:1px solid transparent;cursor:pointer;font-family:inherit;font-weight:700;transition:all .15s}
    .mb:active{transform:scale(.93)}
    .mb-cancel{background:var(--glass);color:var(--text-dim);border-color:var(--border-s)!important}
    .mb-del{background:rgba(232,136,136,.15);color:var(--red);border-color:rgba(232,136,136,.2)!important}

    ::selection{background:rgba(240,194,123,.2);color:#fff}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>

<div class="bg-canvas"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>

<div class="main-wrapper">
  <div class="tab-nav">
    <div class="tab-slider" id="tabSlider"></div>
    <button class="tab-btn active" id="tabCreate" onclick="switchTab('create')">➕ Create</button>
    <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">📜 History</button>
  </div>

  <div class="pages">
    <!-- ===== CREATE ===== -->
    <div class="page active" id="page-create">
      <div class="card">
        <div class="header-row">
          <h2>New Reminder</h2>
          <button class="btn-reset" onclick="resetForm()">RESET</button>
        </div>
        <div class="day-status" id="dayStatus"><div class="dot"></div><span id="dayStatusText">—</span></div>

        <form onsubmit="event.preventDefault();generate()">
          <div class="pill-row">
            <button type="button" class="pill-btn" onclick="setSmartTime(10,0)">10:00 AM</button>
            <button type="button" class="pill-btn" onclick="setSmartTime(11,0)">11:00 AM</button>
            <button type="button" class="pill-btn" onclick="setSmartTime(15,30)">3:30 PM</button>
            <button type="button" class="pill-btn" onclick="setSmartTime(16,0)">4:00 PM</button>
          </div>

          <label>Date</label>
          <input type="date" id="dateIn" class="std-input">
          <div class="jumper-row">
            <button type="button" class="jumper-btn" onclick="addWorkingDays(1)">+1 Day</button>
            <button type="button" class="jumper-btn" onclick="addWorkingDays(2)">+2 Days</button>
            <button type="button" class="jumper-btn" onclick="addWorkingDays(3)">+3 Days</button>
          </div>

          <label>Time <span style="opacity:.5;font-weight:400">(8 AM – 8 PM)</span></label>
          <div class="time-hybrid">
            <!-- Manual HH:MM typing -->
            <input type="tel" id="manualTimeIn" class="time-manual" placeholder="HH:MM" maxlength="5" inputmode="numeric" autocomplete="off">
            <!--
              TIME PICKER — NOT HIDDEN
              The <input type="time"> sits directly on top of the 🕒 icon.
              Text is transparent so you only see the icon,
              but the element is 100% real and tappable on every browser.
            -->
            <div class="picker-wrap">
              <span class="picker-icon">🕒</span>
              <input type="time" id="timePicker" class="picker-real">
            </div>
          </div>
          <div class="time-warn" id="timeWarn">⏰ Outside office hours (8:00 AM – 8:00 PM)</div>

          <label>Message</label>
          <input type="text" id="msgIn" class="std-input" placeholder="Enter reminder text..." enterkeyhint="go">

          <button type="submit" class="btn-generate">GENERATE</button>
        </form>

        <div class="output-section" id="outputSection">
          <label>Bot Command</label>
          <div class="copy-row">
            <textarea id="outBot" readonly rows="1"></textarea>
            <button class="btn-copy" onclick="copyEl('outBot',this)">Copy</button>
          </div>
          <label>Clean Text (+10 min)</label>
          <div class="copy-row">
            <textarea id="outClean" readonly rows="1"></textarea>
            <button class="btn-copy" onclick="copyEl('outClean',this)">Copy</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== HISTORY ===== -->
    <div class="page" id="page-history">
      <div class="card">
        <div class="header-row"><h2>Saved Logs</h2></div>
        <div id="logContainer">
          <div class="empty-log"><span class="empty-log-icon">📋</span>No reminders generated yet.</div>
        </div>
        <button class="btn-clear-history" onclick="clearHistory()">Delete All History</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-box" id="toastBox"></div>

<script>
(function(){
  !function(){const c=document.getElementById('particles');for(let i=0;i<14;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.width=p.style.height=(1+Math.random()*1.5)+'px';p.style.animationDuration=(14+Math.random()*18)+'s';p.style.animationDelay=(-Math.random()*18)+'s';c.appendChild(p)}}();

  let historyData=[];
  const K='elemRemindPro_v7';
  const slider=document.getElementById('tabSlider');
  const dayStatusEl=document.getElementById('dayStatus');
  const dayStatusText=document.getElementById('dayStatusText');
  const timeWarn=document.getElementById('timeWarn');
  const manualTimeIn=document.getElementById('manualTimeIn');
  const timePicker=document.getElementById('timePicker');

  function loadH(){try{return JSON.parse(localStorage.getItem(K))||[]}catch{return[]}}
  function saveH(){localStorage.setItem(K,JSON.stringify(historyData))}

  function toast(t){const c=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast';e.textContent=t;c.appendChild(e);setTimeout(()=>{if(e.parentNode)e.remove()},2600)}

  function confirm2(title,msg,ico,yes){
    const o=document.createElement('div');o.className='modal-ov';
    o.innerHTML=`<div class="modal-bx"><span class="modal-ico">${ico}</span><h3>${title}</h3><p>${msg}</p><div class="modal-btns"><button class="mb mb-cancel">Cancel</button><button class="mb mb-del">Delete</button></div></div>`;
    document.body.appendChild(o);
    o.querySelector('.mb-cancel').onclick=()=>o.remove();
    o.querySelector('.mb-del').onclick=()=>{o.remove();yes()};
    o.addEventListener('click',e=>{if(e.target===o)o.remove()});
  }

  window.switchTab=function(name){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    if(name==='create'){
      document.getElementById('page-create').classList.add('active');
      document.getElementById('tabCreate').classList.add('active');
      slider.classList.remove('right');
    }else{
      document.getElementById('page-history').classList.add('active');
      document.getElementById('tabHistory').classList.add('active');
      slider.classList.add('right');
      renderLogs();
    }
  };

  function isWD(d){
    const w=d.getDay(),dt=d.getDate();
    if(w===0)return false;
    if(w===6){const o=Math.ceil(dt/7);if(o===2||o===4)return false}
    return true;
  }
  function nextWD(d){while(!isWD(d))d.setDate(d.getDate()+1);return d}

  function updateDayStatus(){
    const v=document.getElementById('dateIn').value;
    if(!v){dayStatusEl.className='day-status';dayStatusText.textContent='Select a date';return}
    const[y,m,d]=v.split('-').map(Number);const dt=new Date(y,m-1,d);
    const wk=isWD(dt);
    dayStatusEl.className='day-status'+(wk?'':' off');
    const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let suf='';
    if(dt.getDay()===6){const o=Math.ceil(d/7);suf=` (${o}${o===1?'st':o===2?'nd':o===3?'rd':'th'} Sat)`}
    dayStatusText.textContent=wk
      ?`${dn[dt.getDay()]}, ${d} ${dt.toLocaleString('default',{month:'short'})}${suf} · Working day`
      :`${dn[dt.getDay()]}, ${d} ${dt.toLocaleString('default',{month:'short'})}${suf} · Off day`;
  }

  function validateTime(){
    const v=manualTimeIn.value;
    if(!v||v.length<5){timeWarn.classList.remove('show');return}
    const p=v.split(':');
    if(p.length!==2){timeWarn.classList.remove('show');return}
    const h=parseInt(p[0],10),m=parseInt(p[1],10);
    if(isNaN(h)||isNaN(m)){timeWarn.classList.remove('show');return}
    timeWarn.classList.toggle('show',(h*60+m)<480||(h*60+m)>1200);
  }

  /* ---- Manual input: type digits, auto-insert colon ---- */
  manualTimeIn.addEventListener('input',function(){
    let digits=this.value.replace(/[^0-9]/g,'');
    if(digits.length>4)digits=digits.substring(0,4);
    if(digits.length>=3){
      this.value=digits.substring(0,2)+':'+digits.substring(2);
    }else{
      this.value=digits;
    }
    if(this.value.length===5)timePicker.value=this.value;
    validateTime();
  });

  /* Prevent cursor getting stuck after colon on backspace */
  manualTimeIn.addEventListener('keydown',function(e){
    if(e.key==='Backspace'&&this.selectionStart===3&&this.value.charAt(2)===':'){
      e.preventDefault();
      this.setSelectionRange(2,2);
    }
  });

  /* ---- Picker changes → sync to manual input ---- */
  timePicker.addEventListener('change',function(){
    if(this.value){
      manualTimeIn.value=this.value;
      validateTime();
    }
  });
  timePicker.addEventListener('input',function(){
    if(this.value&&this.value.length===5){
      manualTimeIn.value=this.value;
      validateTime();
    }
  });

  /* ---- Set both inputs from a Date ---- */
  function updateInputs(d){
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
    document.getElementById('dateIn').value=`${y}-${m}-${day}`;
    const t=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    manualTimeIn.value=t;
    timePicker.value=t;
    updateDayStatus();
    validateTime();
  }

  window.setSmartTime=function(h,m){
    let d=new Date();d.setHours(h,m,0,0);
    if(d<new Date()){d.setDate(d.getDate()+1);d=nextWD(d)}
    updateInputs(d);
  };

  window.addWorkingDays=function(days){
    const v=document.getElementById('dateIn').value;
    if(!v){toast('⚠️ Select a date first');return}
    const[y,M,D]=v.split('-').map(Number);let d=new Date(y,M-1,D);
    let added=0;
    while(added<days){d.setDate(d.getDate()+1);if(isWD(d))added++}
    d.setHours(10,0,0,0);
    updateInputs(d);
  };

  window.generate=function(){
    if(document.activeElement)document.activeElement.blur();
    const dStr=document.getElementById('dateIn').value;
    const tStr=manualTimeIn.value;
    const msg=document.getElementById('msgIn').value.trim();
    if(!dStr){toast('⚠️ Select a date');return}
    if(!tStr||tStr.length<5){toast('⚠️ Enter a valid time');return}
    if(!msg){toast('⚠️ Enter a message');return}
    const p=tStr.split(':');
    const tH=parseInt(p[0],10),tM=parseInt(p[1],10);
    if(isNaN(tH)||isNaN(tM)||tH<0||tH>23||tM<0||tM>59){toast('⚠️ Invalid time');return}

    const botCmd=`!remind ${dStr} ${tStr} ${msg}`;
    document.getElementById('outBot').value=botCmd;

    const[y,M,D]=dStr.split('-').map(Number);
    let cd=new Date(y,M-1,D,tH,tM);cd.setMinutes(cd.getMinutes()+10);
    const cleanCmd=`remind ${cd.getFullYear()}-${String(cd.getMonth()+1).padStart(2,'0')}-${String(cd.getDate()).padStart(2,'0')} ${String(cd.getHours()).padStart(2,'0')}:${String(cd.getMinutes()).padStart(2,'0')} ${msg}`;
    document.getElementById('outClean').value=cleanCmd;

    document.getElementById('outputSection').classList.add('active');
    addToHistory(dStr,tStr,msg,cleanCmd);
    toast('✅ Generated!');
  };

  function addToHistory(date,time,msg,cleanCmd){
    const safeMsg=msg||'(No Message)';
    if(historyData.some(i=>i.date===date&&i.time===time&&i.msg===safeMsg))return;
    historyData.push({id:Date.now(),date,time,msg:safeMsg,cleanCmd});
    historyData.sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));
    saveH();
  }

  function renderLogs(){
    const c=document.getElementById('logContainer');
    if(!historyData.length){c.innerHTML='<div class="empty-log"><span class="empty-log-icon">📋</span>No reminders generated yet.</div>';return}
    const grouped={};
    historyData.forEach(i=>{if(!grouped[i.date])grouped[i.date]=[];grouped[i.date].push(i)});
    let html='';
    for(const dk in grouped){
      const items=grouped[dk];
      const upCount=items.filter(i=>iUp(i.date,i.time)).length;
      html+=`<div class="log-section"><div class="log-header"><div><div class="log-date">${dk}</div><div class="log-date-sub">${items.length} reminder${items.length>1?'s':''} · ${upCount} upcoming</div></div><div class="header-actions"><button class="btn-sm btn-summary" onclick="copyDailySummary('${dk}')">Copy</button><button class="btn-sm btn-email" onclick="emailDailySummary('${dk}')">✉️ Email</button></div></div>`;
      items.forEach((item,idx)=>{
        html+=`<div class="log-item" id="li-${item.id}" style="animation-delay:${idx*40}ms"><div class="log-details"><span class="log-time">${item.time}</span><span class="log-msg" title="${esc(item.msg)}">${esc(item.msg)}</span></div><div class="log-actions"><button class="btn-icon resch" onclick="rescheduleItem(${item.id})" title="Reschedule">🔄</button><button class="btn-icon edit" onclick="toggleEdit(${item.id})" title="Edit">✏️</button><button class="btn-icon del" onclick="deleteItem(${item.id})" title="Delete">🗑️</button></div></div><div class="inline-edit" id="ie-${item.id}"><div class="ie-row"><input type="time" class="ie-input" id="ie-t-${item.id}" value="${item.time}"></div><div class="ie-row"><input type="text" class="ie-input" id="ie-m-${item.id}" value="${esc(item.msg)}" placeholder="Message"></div><div class="ie-actions"><button class="ie-btn ie-cancel" onclick="toggleEdit(${item.id})">Cancel</button><button class="ie-btn ie-save" onclick="saveInlineEdit(${item.id})">💾 Save</button></div></div>`;
      });
      html+=`</div>`;
    }
    c.innerHTML=html;
  }

  function iUp(ds,ts){const[y,M,D]=ds.split('-').map(Number);const[h,m]=(ts||'00:00').split(':').map(Number);return new Date(y,M-1,D,h,m,0,0).getTime()>Date.now()}
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

  window.rescheduleItem=function(id){
    const item=historyData.find(i=>i.id===id);if(!item)return;
    document.getElementById('dateIn').value=item.date;
    manualTimeIn.value=item.time;timePicker.value=item.time;
    document.getElementById('msgIn').value=item.msg==='(No Message)'?'':item.msg;
    updateDayStatus();validateTime();switchTab('create');toast('📋 Loaded for reschedule');
  };

  window.toggleEdit=function(id){
    const el=document.getElementById('ie-'+id),li=document.getElementById('li-'+id);if(!el)return;
    const isOpen=el.classList.contains('active');
    document.querySelectorAll('.inline-edit.active').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.log-item.editing').forEach(e=>e.classList.remove('editing'));
    if(!isOpen){el.classList.add('active');li.classList.add('editing')}
  };

  window.saveInlineEdit=function(id){
    const tEl=document.getElementById('ie-t-'+id),mEl=document.getElementById('ie-m-'+id);
    if(!tEl||!mEl)return;
    const newTime=tEl.value,newMsg=mEl.value.trim()||'(No Message)';
    if(!newTime||newTime.length<5){toast('⚠️ Enter valid time');return}
    const idx=historyData.findIndex(i=>i.id===id);if(idx===-1)return;
    const item=historyData[idx];
    const[y,M,D]=item.date.split('-').map(Number);const[h,m]=newTime.split(':').map(Number);
    let cd=new Date(y,M-1,D,h,m);cd.setMinutes(cd.getMinutes()+10);
    const cleanCmd=`remind ${cd.getFullYear()}-${String(cd.getMonth()+1).padStart(2,'0')}-${String(cd.getDate()).padStart(2,'0')} ${String(cd.getHours()).padStart(2,'0')}:${String(cd.getMinutes()).padStart(2,'0')} ${newMsg}`;
    historyData[idx]={...item,time:newTime,msg:newMsg,cleanCmd};
    historyData.sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));
    saveH();renderLogs();toast('✅ Updated');
  };

  window.deleteItem=function(id){
    confirm2('Delete Reminder?','This entry will be permanently removed.','🗑️',()=>{
      historyData=historyData.filter(i=>i.id!==id);saveH();renderLogs();toast('🗑️ Deleted');
    });
  };

  window.copyDailySummary=function(dk){
    const items=historyData.filter(i=>i.date===dk);
    let text=`SCHEDULE FOR ${dk}:\n`;
    items.forEach(i=>text+=`${i.cleanCmd||'!remind '+i.date+' '+i.time+' '+i.msg}\n`);
    navigator.clipboard.writeText(text).then(()=>toast('📋 Summary copied!')).catch(()=>{
      const a=document.createElement('textarea');a.value=text;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('📋 Summary copied!');
    });
  };

  window.emailDailySummary=function(dk){
    const items=historyData.filter(i=>i.date===dk);
    let text=`SCHEDULE FOR ${dk}:\n`;
    items.forEach(i=>text+=`${i.cleanCmd||'!remind '+i.date+' '+i.time+' '+i.msg}\n`);
    if(window.AppInventor){window.AppInventor.setWebViewString(text);toast('✉️ Opening email...')}
    else{navigator.clipboard.writeText(text).then(()=>toast('📋 Copied (email needs AppInventor)')).catch(()=>toast('Email requires AppInventor WebView'))}
  };

  window.clearHistory=function(){
    if(!historyData.length){toast('Nothing to clear');return}
    confirm2('Clear All History?',`${historyData.length} reminder(s) will be deleted.`,'⚠️',()=>{
      historyData=[];localStorage.removeItem(K);renderLogs();toast('🗑️ All cleared');
    });
  };

  window.resetForm=function(){
    document.getElementById('msgIn').value='';updateInputs(new Date());
    document.getElementById('outputSection').classList.remove('active');
    document.getElementById('outBot').value='';document.getElementById('outClean').value='';
  };

  window.copyEl=function(id,btn){
    const ta=document.getElementById(id);ta.select();ta.setSelectionRange(0,99999);
    navigator.clipboard.writeText(ta.value).then(()=>{
      btn.textContent='✓';btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1200);
    }).catch(()=>{
      document.execCommand('copy');btn.textContent='✓';btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1200);
    });
  };

  document.getElementById('dateIn').addEventListener('change',updateDayStatus);

  !function(){updateInputs(new Date());historyData=loadH();renderLogs()}();
})();
</script>
</body>
</html>
