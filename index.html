<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>!remind · Command Generator (YYYY-MM-DD)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Courier New', monospace;
    }
    body {
      background: linear-gradient(145deg, #1e2a2e 0%, #0f1a1f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }
    .classic-card {
      max-width: 700px;
      width: 100%;
      background: #fef9e8;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
      overflow: hidden;
      border: 1px solid #e9d6af;
    }
    .retro-header {
      background: #2c2e2b;
      padding: 1rem 1.8rem;
      border-bottom: 4px solid #c9a87b;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .retro-header h1 {
      font-size: 1.65rem;
      color: #ffe3b3;
      font-family: 'Courier New', monospace;
    }
    .retro-header code {
      background: #1e1f1c;
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      color: #f5cb8b;
    }
    .content {
      padding: 1.8rem 2rem 2rem;
    }
    .cmd-preview {
      background: #1e2a23;
      border-radius: 1.5rem;
      padding: 0.9rem 1.2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      border-left: 8px solid #d9a13b;
    }
    .cmd-preview span {
      color: #d9cfb0;
      font-size: 1rem;
      font-family: monospace;
      word-break: break-all;
    }
    .cmd-label {
      background: #00000066;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      font-size: 0.75rem;
      color: #ffda99;
    }
    .form-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 1.8rem;
      background: #fff7ea;
      padding: 1.2rem;
      border-radius: 1.5rem;
    }
    .input-group {
      flex: 1 1 170px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .input-group label {
      font-size: 0.7rem;
      font-weight: bold;
      color: #6a4e2e;
    }
    .input-group input, .input-group textarea {
      background: #fffcf0;
      border: 1px solid #ddc9a0;
      border-radius: 60px;
      padding: 0.7rem 1rem;
      font-family: monospace;
    }
    button {
      background: #2f3e3a;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 60px;
      font-weight: bold;
      color: #fae7c3;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    button:hover {
      background: #4d6b62;
      transform: scale(0.97);
    }
    .copy-cmd-btn {
      background: #5d7b6e;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
    }
    .status-msg {
      background: #e6dac8;
      border-radius: 60px;
      padding: 0.4rem 1rem;
      font-size: 0.75rem;
      margin-top: 1rem;
      text-align: center;
      color: #2a473b;
    }
    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 0.8rem;
      color: #6f5a3e;
      border-top: 1px solid #eedbba;
    }
  </style>
</head>
<body>
<div class="classic-card">
  <div class="retro-header">
    <h1>📟 !remind · YYYY-MM-DD</h1>
    <code>copies as yyyy-mm-dd</code>
  </div>
  <div class="content">
    <div class="cmd-preview">
      <span class="cmd-label">⚡ COPY THIS COMMAND</span>
      <span id="liveCommandPreview">!remind 2026-06-05 10:00 meeting</span>
      <button id="copyLiveCommandBtn" class="copy-cmd-btn">📋 Copy</button>
    </div>

    <div class="form-grid">
      <div class="input-group">
        <label>📅 DATE (dd-mm-yyyy)</label>
        <input type="text" id="remindDate" placeholder="dd-mm-yyyy">
      </div>
      <div class="input-group">
        <label>⏰ TIME (hh:mm)</label>
        <input type="text" id="remindTime" placeholder="10:00" value="10:00">
      </div>
      <div class="input-group">
        <label>💬 MESSAGE</label>
        <textarea id="remindMsg" rows="1">meeting</textarea>
      </div>
    </div>

    <div id="statusMessage" class="status-msg">✅ Default = today's date · you can edit freely</div>
  </div>
  <footer>Copy the command and paste into your classic app · no auto‑reset</footer>
</div>

<script>
  const dateInput = document.getElementById('remindDate');
  const timeInput = document.getElementById('remindTime');
  const msgInput = document.getElementById('remindMsg');
  const liveCmdSpan = document.getElementById('liveCommandPreview');
  const copyBtn = document.getElementById('copyLiveCommandBtn');
  const statusDiv = document.getElementById('statusMessage');

  function pad(n) {
    return n.toString().padStart(2, '0');
  }

  // set initial default date (today) WITHOUT overriding user edits later
  function setInitialDate() {
    const today = new Date();
    const day = pad(today.getDate());
    const month = pad(today.getMonth() + 1);
    const year = today.getFullYear();
    dateInput.value = `${day}-${month}-${year}`;
  }

  // convert DD-MM-YYYY to YYYY-MM-DD (only if valid)
  function convertToYMD(dateStr) {
    const parts = dateStr.split('-');
    if (parts.length !== 3) return dateStr;
    let [day, month, year] = parts;
    // basic validation: day/month should be numbers
    if (isNaN(parseInt(day)) || isNaN(parseInt(month)) || isNaN(parseInt(year))) {
      return dateStr; // keep as is
    }
    day = pad(parseInt(day));
    month = pad(parseInt(month));
    year = parseInt(year);
    if (year < 1000 || year > 9999) return dateStr;
    return `${year}-${month}-${day}`;
  }

  function updateCommandPreview() {
    let dateVal = dateInput.value.trim();
    let timeVal = timeInput.value.trim();
    let msgVal = msgInput.value.trim();

    // If date is empty, use placeholder
    if (dateVal === "") dateVal = "dd-mm-yyyy";
    // If time is empty, use placeholder
    if (timeVal === "") timeVal = "hh:mm";
    if (msgVal === "") msgVal = "message";

    // Try to convert to YYYY-MM-DD only if it looks like DD-MM-YYYY
    let ymdDate = dateVal;
    if (/^\d{2}-\d{2}-\d{4}$/.test(dateVal)) {
      ymdDate = convertToYMD(dateVal);
    }
    const command = `!remind ${ymdDate} ${timeVal} ${msgVal.substring(0, 60)}`;
    liveCmdSpan.innerText = command;
  }

  function copyCommand() {
    const command = liveCmdSpan.innerText;
    navigator.clipboard.writeText(command).then(() => {
      statusDiv.innerHTML = "✅ Copied! (YYYY-MM-DD format)";
      statusDiv.style.background = "#cde5d0";
      setTimeout(() => {
        statusDiv.style.background = "#e6dac8";
        statusDiv.innerHTML = "✅ Ready · edit any field freely";
      }, 2000);
    }).catch(() => {
      statusDiv.innerHTML = "❌ Copy failed. Select manually.";
      statusDiv.style.background = "#ffded5";
    });
  }

  // Set initial date only once
  setInitialDate();
  updateCommandPreview();

  // Event listeners: update preview on any change (no reset)
  dateInput.addEventListener('input', updateCommandPreview);
  timeInput.addEventListener('input', updateCommandPreview);
  msgInput.addEventListener('input', updateCommandPreview);
  copyBtn.addEventListener('click', copyCommand);
</script>
</body>
</html>
