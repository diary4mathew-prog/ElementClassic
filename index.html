
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remind Studio Pro</title>
<style>
:root{
  --bg1:#071814;
  --bg2:#0f2f28;
  --gold:#f0c27b;
  --glass:rgba(255,255,255,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  font-family:Inter,system-ui,sans-serif;
  background:
  radial-gradient(circle at top left,#18453b 0%,transparent 35%),
  radial-gradient(circle at bottom right,#5b3a12 0%,transparent 30%),
  linear-gradient(135deg,var(--bg1),var(--bg2));
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.card{
  width:min(920px,100%);
  background:rgba(20,20,20,.45);
  backdrop-filter:blur(20px);
  border:1px solid rgba(240,194,123,.25);
  border-radius:32px;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,.45);
}
.header{
  padding:24px 30px;
  background:linear-gradient(90deg,rgba(240,194,123,.12),transparent);
  border-bottom:1px solid rgba(240,194,123,.2);
}
h1{
  color:white;
  font-size:2rem;
}
.sub{color:#d7c7a8;margin-top:6px}
.content{padding:30px}
.preview{
  background:var(--glass);
  border:1px solid rgba(240,194,123,.25);
  border-radius:24px;
  padding:20px;
  margin-bottom:24px;
}
.command{
  color:#ffe6b8;
  font-family:Consolas,monospace;
  font-size:1.1rem;
  word-break:break-word;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
}
.box{
  background:rgba(255,255,255,.06);
  border-radius:22px;
  padding:18px;
}
label{
  color:#f0c27b;
  display:block;
  margin-bottom:8px;
  font-size:.8rem;
  letter-spacing:1px;
}
input,textarea{
  width:100%;
  border:none;
  border-radius:14px;
  padding:12px;
  font-size:1rem;
}
button{
  margin-top:20px;
  border:none;
  border-radius:18px;
  padding:14px 22px;
  background:linear-gradient(135deg,#f0c27b,#c79a55);
  font-weight:bold;
  cursor:pointer;
}
.status{margin-top:16px;color:#ddd}
</style>
</head>
<body>
<div class="card">
<div class="header">
<h1>✨ Remind Studio Pro</h1>
<div class="sub">Premium glassmorphism • cleaner layout • mobile friendly</div>
</div>
<div class="content">
<div class="preview">
<div class="command" id="cmd">!remind 2026-06-09 10:00 team sync</div>
</div>

<div class="grid">
<div class="box">
<label>Date</label>
<input type="date" id="d">
</div>
<div class="box">
<label>Time</label>
<input type="time" id="t">
</div>
<div class="box">
<label>Message</label>
<textarea id="m">team sync</textarea>
</div>
</div>

<button onclick="copyCmd()">Copy Command</button>
<div class="status" id="s">Ready</div>
</div>
</div>

<script>
const d=document.getElementById('d');
const t=document.getElementById('t');
const m=document.getElementById('m');
const cmd=document.getElementById('cmd');

function init(){
 let now=new Date();
 d.value=now.toISOString().slice(0,10);
 t.value='10:00';
 update();
}
function update(){
 cmd.textContent=`!remind ${d.value||'YYYY-MM-DD'} ${t.value||'HH:MM'} ${m.value||'reminder'}`;
}
[d,t,m].forEach(x=>x.addEventListener('input',update));

function copyCmd(){
 navigator.clipboard.writeText(cmd.textContent);
 document.getElementById('s').textContent='✅ Command copied';
}
init();
</script>
</body>
</html>
