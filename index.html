<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remind Studio Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --gold:#f0c27b;--gold-dim:#c79a55;
      --green:#6dd4a0;--red:#e88;--bg-deep:#060f0c;
      --glass:rgba(16,16,16,.55);--glass-light:rgba(255,255,255,.06);
      --glass-border:rgba(240,194,123,.16);--text:#f5efe8;--text-dim:#b3a186;
    }
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',system-ui,sans-serif;background:var(--bg-deep);
      display:flex;flex-direction:column;align-items:center;
      position:relative;
    }

    /* ---- bg ---- */
    .bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:oF 20s ease-in-out infinite alternate}
    .orb-1{width:400px;height:400px;background:radial-gradient(circle,#18453b,transparent 70%);top:-10%;left:-15%}
    .orb-2{width:350px;height:350px;background:radial-gradient(circle,#5b3a12,transparent 70%);bottom:-8%;right:-12%;animation-delay:-7s;animation-duration:24s}
    @keyframes oF{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-25px) scale(1.06)}100%{transform:translate(-15px,30px) scale(.96)}}
    .noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}
    .particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
    .particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:pD linear infinite}
    @keyframes pD{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.5}90%{opacity:.3}100%{opacity:0;transform:translateY(-10vh) scale(1)}}

    /* ---- screens container ---- */
    .screens{position:relative;z-index:10;width:100%;height:100%;overflow:hidden}

    /* ---- screen base ---- */
    .screen{
      position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      transition:transform .4s cubic-bezier(.32,.72,0,1),opacity .35s ease;
      will-change:transform,opacity;
    }
    .screen::-webkit-scrollbar{width:3px}
    .screen::-webkit-scrollbar-track{background:transparent}
    .screen::-webkit-scrollbar-thumb{background:rgba(240,194,123,.1);border-radius:8px}

    /* ---- screen 1: main ---- */
    #screenMain{transform:translateX(0);opacity:1;z-index:10}
    #screenMain.pushed{transform:translateX(-30%);opacity:.4;pointer-events:none}

    /* ---- screen 2: history ---- */
    #screenHistory{transform:translateX(100%);opacity:0;z-index:20;pointer-events:none;background:var(--bg-deep)}
    #screenHistory.open{transform:translateX(0);opacity:1;pointer-events:auto}

    /* ---- screen 3: edit ---- */
    #screenEdit{transform:translateX(100%);opacity:0;z-index:30;pointer-events:none;background:var(--bg-deep)}
    #screenEdit.open{transform:translateX(0);opacity:1;pointer-events:auto}

    /* ---- main card ---- */
    .main-wrap{padding:16px 14px 40px;display:flex;flex-direction:column;min-height:100%}
    .card{
      background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--glass-border);border-radius:24px;overflow:hidden;
      box-shadow:0 0 0 1px rgba(0,0,0,.3),0 16px 40px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);
      flex:1;
    }

    /* ---- header ---- */
    .hdr{padding:20px 20px 16px;position:relative;overflow:hidden;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between}
    .hdr::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,rgba(240,194,123,.08) 0%,transparent 50%)}
    .hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,194,123,.25),transparent)}
    .hdr h1{color:#fff;font-size:1.2rem;font-weight:700;letter-spacing:-.3px;position:relative}
    .hdr .sub{color:var(--text-dim);margin-top:2px;font-size:.7rem;font-weight:400;position:relative}
    .hist-btn{
      position:relative;background:var(--glass-light);border:1px solid var(--glass-border);
      color:var(--gold);padding:10px 16px;border-radius:20px;font-size:.78rem;
      cursor:pointer;transition:all .2s;font-family:inherit;font-weight:600;
      display:flex;align-items:center;gap:7px;flex-shrink:0;
    }
    .hist-btn:active{transform:scale(.94);background:rgba(255,255,255,.1)}
    .badge{
      background:linear-gradient(135deg,var(--gold),var(--gold-dim));
      color:#0a1e1a;padding:1px 8px;border-radius:16px;
      font-size:.64rem;font-weight:800;min-width:20px;text-align:center;
    }

    /* ---- content ---- */
    .cnt{padding:20px}

    /* ---- preview ---- */
    .preview{
      position:relative;border-radius:18px;padding:16px 18px;margin-bottom:20px;
      background:rgba(0,0,0,.25);border:1px solid var(--glass-border);transition:border-color .3s;
    }
    .preview::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,194,123,.03),transparent 60%);pointer-events:none}
    .preview:active{border-color:var(--gold)}
    .preview-label{font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;color:rgba(240,194,123,.35);margin-bottom:8px;font-weight:600}
    .command{color:#ffe6b8;font-family:'Consolas','Menlo','Monaco',monospace;font-size:.9rem;word-break:break-word;min-height:1.3em;line-height:1.5;text-shadow:0 0 15px rgba(240,194,123,.1);position:relative;z-index:1}

    /* ---- form ---- */
    .form-stack{display:flex;flex-direction:column;gap:14px}
    .field{background:var(--glass-light);border-radius:18px;padding:16px;border:1px solid rgba(255,255,255,.04);transition:all .3s;position:relative;overflow:hidden}
    .field::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent)}
    .field:focus-within{border-color:rgba(240,194,123,.2);background:rgba(255,255,255,.08)}
    .field:focus-within label{color:#ffd99a}
    label{color:var(--gold);display:block;margin-bottom:10px;font-size:.66rem;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;transition:color .2s}
    input,textarea{
      width:100%;border:1px solid rgba(255,255,255,.05);border-radius:14px;
      padding:14px 16px;font-size:1rem;background:rgba(0,0,0,.3);color:var(--text);
      outline:none;transition:all .25s;font-family:inherit;-webkit-appearance:none;appearance:none;
    }
    input:focus,textarea:focus{border-color:var(--gold);background:rgba(0,0,0,.45);box-shadow:0 0 0 3px rgba(240,194,123,.07)}
    input[type="time"]{color-scheme:dark;cursor:pointer}
    textarea{resize:none;min-height:56px;line-height:1.5}
    .hint{font-size:.64rem;color:#7a7060;margin-top:8px;padding-left:2px;transition:color .2s;line-height:1.4}

    /* ---- actions ---- */
    .action-stack{display:flex;flex-direction:column;gap:10px;margin-top:20px}
    .btn-row{display:flex;gap:10px}
    .btn-primary{
      flex:1;border:none;border-radius:16px;padding:16px 20px;
      background:linear-gradient(135deg,var(--gold),var(--gold-dim));
      font-weight:700;font-size:.92rem;color:#0a1e1a;cursor:pointer;
      transition:all .2s;font-family:inherit;overflow:hidden;letter-spacing:.2px;
      box-shadow:0 4px 16px rgba(192,150,70,.2);position:relative;
    }
    .btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 60%);opacity:0;transition:opacity .2s}
    .btn-primary:active::before{opacity:1}
    .btn-primary:active{transform:scale(.97)}
    .btn-secondary{
      flex:1;border:1px solid var(--glass-border);border-radius:16px;padding:15px 16px;
      background:var(--glass-light);font-weight:600;font-size:.92rem;color:var(--gold);
      cursor:pointer;transition:all .2s;font-family:inherit;
    }
    .btn-secondary:active{transform:scale(.97);background:rgba(255,255,255,.1);border-color:var(--gold)}

    .status{color:var(--text-dim);font-size:.8rem;padding:4px 0;min-height:1.8rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .status-badge{background:rgba(240,194,123,.08);padding:3px 12px;border-radius:20px;font-size:.64rem;color:var(--gold);letter-spacing:.2px;border:1px solid rgba(240,194,123,.12);white-space:nowrap;font-weight:600}
    .info-line{margin-top:14px;font-size:.66rem;color:#5a5548;border-top:1px solid rgba(255,255,255,.04);padding-top:12px;display:flex;flex-wrap:wrap;gap:6px 14px;line-height:1.5}

    /* ======== HISTORY SCREEN ======== */
    .page-hdr{
      padding:18px 20px;position:sticky;top:0;z-index:5;
      background:rgba(6,15,12,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:14px;
    }
    .page-hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,194,123,.2),transparent)}
    .back-btn{
      background:var(--glass-light);border:1px solid var(--glass-border);
      color:var(--gold);width:40px;height:40px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;font-size:1.1rem;
      cursor:pointer;transition:all .2s;flex-shrink:0;font-family:inherit;
    }
    .back-btn:active{transform:scale(.9);background:rgba(255,255,255,.1)}
    .page-title{color:#fff;font-size:1.05rem;font-weight:700;flex:1}
    .page-subtitle{color:var(--text-dim);font-size:.7rem;font-weight:400;margin-top:1px}
    .clear-btn{
      background:rgba(220,80,80,.06);border:1px solid rgba(220,80,80,.1);
      color:var(--red);padding:8px 14px;border-radius:14px;font-size:.68rem;
      cursor:pointer;font-family:inherit;font-weight:600;flex-shrink:0;transition:all .2s;
    }
    .clear-btn:active{transform:scale(.9);background:rgba(220,80,80,.18)}

    .hist-body{padding:16px 14px 60px}
    .hist-empty{text-align:center;color:#3a3530;padding:80px 20px;font-size:.88rem;line-height:1.6}
    .hist-empty-icon{font-size:3rem;margin-bottom:12px;display:block;opacity:.4}

    .h-item{
      background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--glass-border);border-radius:20px;
      padding:18px 18px 18px 22px;margin-bottom:10px;
      position:relative;overflow:hidden;transition:all .25s;
      cursor:pointer;animation:hIn .35s cubic-bezier(.4,0,.2,1) both;
    }
    .h-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0;transition:background .3s}
    .h-item.work::before{background:var(--green)}
    .h-item.off::before{background:var(--red)}
    .h-item.past-item{opacity:.5}
    .h-item:active{transform:scale(.98);background:rgba(255,255,255,.06)}
    @keyframes hIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    .h-top{display:flex;align-items:flex-start;gap:12px}
    .h-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
    .h-dot.up{background:var(--green);box-shadow:0 0 10px rgba(109,212,160,.3)}
    .h-dot.past{background:#555}
    .h-dot.offd{background:var(--red);box-shadow:0 0 8px rgba(238,136,136,.2)}
    .h-cmd{font-family:'Consolas','Menlo','Monaco',monospace;font-size:.82rem;color:#ffe6b8;word-break:break-word;line-height:1.5;flex:1}
    .h-arrow{color:rgba(255,255,255,.15);font-size:.9rem;flex-shrink:0;margin-top:5px}
    .h-meta{display:flex;flex-wrap:wrap;gap:5px 10px;margin-top:8px;padding-left:20px}
    .h-tag{font-size:.62rem;padding:3px 9px;border-radius:8px;font-weight:600;background:rgba(255,255,255,.04);color:#8a7e6e}
    .h-tag.wt{background:rgba(109,212,160,.06);color:var(--green)}
    .h-tag.ot{background:rgba(220,80,80,.08);color:var(--red)}
    .h-tag.pt{color:#666}

    /* ======== EDIT SCREEN ======== */
    .edit-body{padding:20px 14px 60px}
    .edit-card{
      background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid var(--glass-border);border-radius:24px;overflow:hidden;
      box-shadow:0 12px 36px rgba(0,0,0,.3);
    }
    .edit-status{
      padding:14px 20px;font-size:.72rem;font-weight:600;
      border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:8px;
    }
    .edit-status.ws{background:rgba(109,212,160,.05);color:var(--green)}
    .edit-status.os{background:rgba(220,80,80,.05);color:var(--red)}
    .edit-status .dot{width:6px;height:6px;border-radius:50%}
    .edit-status.ws .dot{background:var(--green);box-shadow:0 0 8px rgba(109,212,160,.4)}
    .edit-status.os .dot{background:var(--red);box-shadow:0 0 6px rgba(238,136,136,.3)}
    .edit-form{padding:20px}
    .edit-form .form-stack{gap:18px}
    .edit-form label{font-size:.64rem}
    .edit-form input,.edit-form textarea{font-size:.95rem;padding:14px 16px}

    .edit-actions{display:flex;flex-direction:column;gap:10px;margin-top:22px}
    .edit-btn-row{display:flex;gap:10px}
    .btn-save-edit{
      flex:1;border:none;border-radius:16px;padding:16px;
      background:linear-gradient(135deg,var(--green),#4ab88a);
      font-weight:700;font-size:.92rem;color:#0a1e1a;cursor:pointer;
      transition:all .2s;font-family:inherit;box-shadow:0 4px 14px rgba(109,212,160,.2);
    }
    .btn-save-edit:active{transform:scale(.97)}
    .btn-del-edit{
      border:1px solid rgba(220,80,80,.15);border-radius:16px;padding:15px;
      background:rgba(220,80,80,.06);font-weight:600;font-size:.92rem;color:var(--red);
      cursor:pointer;transition:all .2s;font-family:inherit;
    }
    .btn-del-edit:active{transform:scale(.97);background:rgba(220,80,80,.15)}
    .btn-copy-edit{
      border:1px solid var(--glass-border);border-radius:16px;padding:15px;
      background:var(--glass-light);font-weight:600;font-size:.92rem;color:var(--gold);
      cursor:pointer;transition:all .2s;font-family:inherit;
    }
    .btn-copy-edit:active{transform:scale(.97);border-color:var(--gold)}

    /* ---- toast ---- */
    .toast-box{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;width:calc(100% - 40px);max-width:400px}
    .toast{
      width:100%;background:rgba(16,16,16,.94);backdrop-filter:blur(16px);
      border:1px solid rgba(240,194,123,.2);color:var(--gold);
      padding:14px 20px;border-radius:18px;font-size:.84rem;font-weight:600;
      box-shadow:0 8px 28px rgba(0,0,0,.5);
      animation:tI .35s cubic-bezier(.4,0,.2,1),tO .35s ease-in 2s forwards;
      pointer-events:auto;font-family:'Inter',system-ui,sans-serif;text-align:center;
    }
    @keyframes tI{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes tO{from{opacity:1}to{opacity:0;transform:translateY(-10px) scale(.96)}}

    /* ---- modal ---- */
    .modal-ov{
      position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;z-index:9998;
      animation:mF .2s ease-out;padding:24px;
    }
    @keyframes mF{from{opacity:0}to{opacity:1}}
    .modal-bx{
      background:rgba(20,20,20,.98);border:1px solid rgba(240,194,123,.18);
      border-radius:24px;padding:32px 28px;max-width:340px;width:100%;text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,.5);animation:mP .25s cubic-bezier(.4,0,.2,1);
    }
    @keyframes mP{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-ico{font-size:2rem;margin-bottom:12px;display:block}
    .modal-bx h3{color:var(--gold);font-size:1.05rem;margin-bottom:6px;font-weight:700}
    .modal-bx p{color:var(--text-dim);font-size:.84rem;margin-bottom:24px;line-height:1.5}
    .modal-btns{display:flex;gap:10px}
    .modal-btns .btn-s{flex:1;padding:14px;font-size:.88rem;border-radius:16px;justify-content:center;border:1px solid transparent;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
    .modal-btns .btn-s:active{transform:scale(.94)}
    .mb-cancel{background:rgba(255,255,255,.06);color:#999;border-color:rgba(255,255,255,.08)!important}
    .mb-del{background:rgba(220,80,80,.15);color:var(--red);border-color:rgba(220,80,80,.2)!important}

    ::selection{background:rgba(240,194,123,.2);color:#fff}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>

<div class="bg-canvas"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>

<div class="screens">

  <!-- ===== SCREEN 1: MAIN ===== -->
  <div class="screen" id="screenMain">
    <div class="main-wrap">
      <div class="card">
        <div class="hdr">
          <div>
            <h1>Remind Studio Pro</h1>
            <div class="sub">⏰ 8 AM – 8 PM · working days</div>
          </div>
          <button class="hist-btn" onclick="openHistory()" aria-label="Open history">
            📜 <span class="badge" id="histBadge">0</span>
          </button>
        </div>
        <div class="cnt">
          <div class="preview" onclick="copyCmd()">
            <div class="preview-label">Tap to copy</div>
            <div class="command" id="cmd">!remind YYYY-MM-DD HH:MM reminder</div>
          </div>
          <div class="form-stack">
            <div class="field">
              <label for="d">📅 Date</label>
              <input type="date" id="d">
              <div class="hint"><span id="dayInfo">—</span></div>
            </div>
            <div class="field">
              <label for="t">⏱️ Time</label>
              <input type="time" id="t" step="60" min="08:00" max="20:00">
              <div class="hint"><span id="timeInfo">8:00 AM – 8:00 PM</span></div>
            </div>
            <div class="field">
              <label for="m">💬 Message</label>
              <textarea id="m" rows="2" placeholder="e.g. team sync"></textarea>
            </div>
          </div>
          <div class="action-stack">
            <div class="btn-row">
              <button class="btn-primary" onclick="saveReminder()">💾 Save</button>
              <button class="btn-secondary" onclick="copyCmd()">📋 Copy</button>
            </div>
            <div class="status" id="s">
              <span>✅ Ready</span>
              <span class="status-badge" id="statusBadge">working day</span>
            </div>
          </div>
          <div class="info-line">
            <span>🟢 Mon–Fri + 1st/3rd/5th Sat</span>
            <span>⛔ Sun + 2nd/4th Sat</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 2: HISTORY ===== -->
  <div class="screen" id="screenHistory">
    <div class="page-hdr">
      <button class="back-btn" onclick="closeHistory()" aria-label="Go back">←</button>
      <div style="flex:1">
        <div class="page-title">History</div>
        <div class="page-subtitle" id="histSub">0 reminders</div>
      </div>
      <button class="clear-btn" onclick="clearAll()">Clear all</button>
    </div>
    <div class="hist-body" id="histBody">
      <div class="hist-empty" id="histEmpty">
        <span class="hist-empty-icon">📋</span>
        No reminders saved yet.<br>Create one from the main screen.
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 3: EDIT ===== -->
  <div class="screen" id="screenEdit">
    <div class="page-hdr">
      <button class="back-btn" onclick="closeEdit()" aria-label="Go back">←</button>
      <div style="flex:1">
        <div class="page-title">Edit Reminder</div>
        <div class="page-subtitle" id="editSub">—</div>
      </div>
    </div>
    <div class="edit-body">
      <div class="edit-card">
        <div class="edit-status" id="editStatus">
          <div class="dot"></div>
          <span id="editStatusText">—</span>
        </div>
        <div class="edit-form">
          <div class="form-stack">
            <div class="field">
              <label for="ed">📅 Date</label>
              <input type="date" id="ed">
              <div class="hint"><span id="edDayInfo">—</span></div>
            </div>
            <div class="field">
              <label for="et">⏱️ Time</label>
              <input type="time" id="et" step="60" min="08:00" max="20:00">
              <div class="hint"><span id="edTimeInfo">8:00 AM – 8:00 PM</span></div>
            </div>
            <div class="field">
              <label for="em">💬 Message</label>
              <textarea id="em" rows="3" placeholder="Reminder message"></textarea>
            </div>
          </div>
          <div class="edit-actions">
            <div class="edit-btn-row">
              <button class="btn-save-edit" onclick="saveEdit()">💾 Save Changes</button>
            </div>
            <div class="edit-btn-row">
              <button class="btn-copy-edit" onclick="copyEditCmd()">📋 Copy Command</button>
              <button class="btn-del-edit" onclick="deleteEdit()">🗑️ Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast-box" id="toastBox"></div>

<script>
(function(){
  /* particles */
  !function(){const c=document.getElementById('particles');for(let i=0;i<16;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.width=p.style.height=(1+Math.random()*1.5)+'px';p.style.animationDuration=(14+Math.random()*18)+'s';p.style.animationDelay=(-Math.random()*18)+'s';c.appendChild(p)}}();

  /* refs */
  const dI=document.getElementById('d'),tI=document.getElementById('t'),mI=document.getElementById('m');
  const cmdEl=document.getElementById('cmd'),sEl=document.getElementById('s');
  const dInf=document.getElementById('dayInfo'),tInf=document.getElementById('timeInfo');
  const hBadge=document.getElementById('histBadge'),hSub=document.getElementById('histSub');
  const histBody=document.getElementById('histBody'),histEmpty=document.getElementById('histEmpty');
  const scrMain=document.getElementById('screenMain');
  const scrHist=document.getElementById('screenHistory');
  const scrEdit=document.getElementById('screenEdit');
  const edI=document.getElementById('ed'),etI=document.getElementById('et'),emI=document.getElementById('em');
  const edDayInf=document.getElementById('edDayInfo'),edTimeInf=document.getElementById('edTimeInfo');
  const editStatus=document.getElementById('editStatus'),editStatusText=document.getElementById('editStatusText');
  const editSub=document.getElementById('editSub');

  const K='rsp_v4';
  let editingId=null;

  /* storage */
  const ld=()=>{try{return JSON.parse(localStorage.getItem(K))||[]}catch{return[]}};
  const sv=a=>{localStorage.setItem(K,JSON.stringify(a));updBadge()};
  const updBadge=()=>{const n=ld().length;hBadge.textContent=n;hSub.textContent=n+' reminder'+(n!==1?'s':'')};

  /* helpers */
  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const pD=s=>{if(!s)return null;const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])};
  const iWD=d=>{if(!d||isNaN(d))return false;const w=d.getDay();if(!w)return false;if(w===6){const o=Math.ceil(d.getDate()/7);return o!==2&&o!==4}return true};
  const iTV=t=>{if(!t)return false;const[h,m]=t.split(':').map(Number);if(isNaN(h)||isNaN(m))return false;const v=h*60+m;return v>=480&&v<=1200};
  const dL=d=>{if(!d||isNaN(d))return'—';const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];let s='';if(d.getDay()===6){const o=Math.ceil(d.getDate()/7);s=` (${o}${o===1?'st':o===2?'nd':o===3?'rd':'th'} Sat)`}return`${dn[d.getDay()]}, ${d.getDate()} ${d.toLocaleString('default',{month:'short'})}${s}`};
  const f12=t=>{if(!t)return'';const[h,m]=t.split(':');const hr=+h;return`${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`};
  const iUp=(ds,ts)=>{const d=pD(ds);if(!d)return false;const[h,m]=(ts||'00:00').split(':').map(Number);d.setHours(h,m,0,0);return d.getTime()>Date.now()};
  const bC=(d,t,m)=>`!remind ${d||'YYYY-MM-DD'} ${t||'HH:MM'} ${m||'reminder'}`;
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  /* toast */
  function toast(t){const c=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast';e.textContent=t;c.appendChild(e);setTimeout(()=>{if(e.parentNode)e.remove()},2600)}

  /* modal */
  function confirm2(title,msg,ico,yes){
    const o=document.createElement('div');o.className='modal-ov';
    o.innerHTML=`<div class="modal-bx"><span class="modal-ico">${ico}</span><h3>${title}</h3><p>${msg}</p><div class="modal-btns"><button class="btn-s mb-cancel">Cancel</button><button class="btn-s mb-del">Delete</button></div></div>`;
    document.body.appendChild(o);
    o.querySelector('.mb-cancel').onclick=()=>o.remove();
    o.querySelector('.mb-del').onclick=()=>{o.remove();yes()};
    o.addEventListener('click',e=>{if(e.target===o)o.remove()});
  }

  /* ---- main screen update ---- */
  function update(){
    const dv=dI.value,tv=tI.value,msg=mI.value.trim()||'reminder';
    const dObj=pD(dv);
    if(dObj&&!isNaN(dObj)){const wk=iWD(dObj);dInf.textContent=`${dL(dObj)} · ${wk?'✅ working':'⛔ off'}`;dInf.style.color=wk?'#8fd4aa':'#e88'}
    else{dInf.textContent='—';dInf.style.color='#7a7060'}
    if(tv){const[h,m]=tv.split(':').map(Number);const v=h*60+m;if(v<480){tInf.textContent='⏰ before 8 AM';tInf.style.color='#e88'}else if(v>1200){tInf.textContent='⏰ after 8 PM';tInf.style.color='#e88'}else{tInf.textContent=`✅ ${f12(tv)}`;tInf.style.color='#8fd4aa'}}
    else{tInf.textContent='8:00 AM – 8:00 PM';tInf.style.color='#7a7060'}
    const dOk=dObj&&iWD(dObj),tOk=iTV(tv);
    cmdEl.textContent=bC(dv,tv,msg);
    if(!dv) sEl.innerHTML='<span>⚠️ Pick a date</span><span class="status-badge">pending</span>';
    else if(!dOk) sEl.innerHTML='<span>⛔ Off day</span><span class="status-badge">off</span>';
    else if(!tOk) sEl.innerHTML='<span>⏰ 8 AM – 8 PM only</span><span class="status-badge">adjust</span>';
    else sEl.innerHTML=`<span>✅ ${dv} ${tv}</span><span class="status-badge">ready</span>`;
  }

  /* ---- copy ---- */
  window.copyCmd=function(text){
    const t=text||cmdEl.textContent;
    navigator.clipboard.writeText(t).then(()=>toast('📋 Copied!')).catch(()=>{
      const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('📋 Copied!')
    });
  };

  /* ---- save new ---- */
  window.saveReminder=function(){
    const dv=dI.value,tv=tI.value,msg=mI.value.trim();
    if(!dv){toast('⚠️ Pick a date');return}if(!tv){toast('⚠️ Pick a time');return}if(!msg){toast('⚠️ Type a message');return}
    const dObj=pD(dV=dv);
    const e={id:uid(),date:dv,time:tv,message:msg,working:dObj?iWD(dObj):false,timeValid:iTV(tv),createdAt:new Date().toISOString()};
    const h=ld();h.unshift(e);sv(h);
    window.copyCmd(bC(dv,tv,msg));toast('💾 Saved & copied!');
    mI.value='';update();
  };

  /* ---- navigation ---- */
  window.openHistory=function(){
    scrMain.classList.add('pushed');
    scrHist.classList.add('open');
    scrHist.scrollTop=0;
    renderHistory();
  };
  window.closeHistory=function(){
    scrHist.classList.remove('open');
    scrMain.classList.remove('pushed');
  };
  window.openEdit=function(id){
    const item=ld().find(i=>i.id===id);if(!item)return;
    editingId=id;
    edI.value=item.date;etI.value=item.time;emI.value=item.message;
    updateEditStatus();
    scrHist.classList.add('pushed');
    scrEdit.classList.add('open');
    scrEdit.scrollTop=0;
  };
  window.closeEdit=function(){
    scrEdit.classList.remove('open');
    scrHist.classList.remove('pushed');
    editingId=null;
    renderHistory();
  };

  /* ---- render history list ---- */
  function renderHistory(){
    const h=ld();updBadge();
    if(!h.length){histBody.innerHTML='<div class="hist-empty"><span class="hist-empty-icon">📋</span>No reminders saved yet.<br>Create one from the main screen.</div>';return}
    let html='';
    h.forEach((item,i)=>{
      const up=iUp(item.date,item.time),wk=item.working,tv=item.timeValid;
      const cls=(wk?'work':'off')+(!up?' past-item':'');
      const dotCls=wk?(up?'up':'past'):'offd';
      const cmd=bldC(item);
      const cd=new Date(item.createdAt);
      const cs=cd.toLocaleDateString('default',{month:'short',day:'numeric'})+' '+cd.toLocaleTimeString('default',{hour:'2-digit',minute:'2-digit'});
      html+=`
        <div class="h-item ${cls}" style="animation-delay:${i*30}ms" onclick="openEdit('${item.id}')">
          <div class="h-top">
            <div class="h-dot ${dotCls}"></div>
            <div class="h-cmd">${esc(cmd)}</div>
            <div class="h-arrow">›</div>
          </div>
          <div class="h-meta">
            <span class="h-tag ${wk?'wt':'ot'}">${wk?'🟢 working':'⛔ off-day'}</span>
            ${!tv?'<span class="h-tag ot">⏰ outside hrs</span>':''}
            <span class="h-tag ${up?'wt':'pt'}">${up?'⏳ upcoming':'✓ past'}</span>
            <span class="h-tag" style="opacity:.5">${cs}</span>
          </div>
        </div>`;
    });
    histBody.innerHTML=html;
  }
  function bldC(item){return`!remind ${item.date} ${item.time} ${item.message}`}

  /* ---- edit screen logic ---- */
  function updateEditStatus(){
    const dv=edI.value,tv=etI.value;
    const dObj=pD(dv);
    const wk=dObj?iWD(dObj):false;
    const tv2=iTV(tv);

    if(dObj&&!isNaN(dObj)){
      edDayInf.textContent=`${dL(dObj)} · ${wk?'✅ working':'⛔ off'}`;
      edDayInf.style.color=wk?'#8fd4aa':'#e88';
    }else{edDayInf.textContent='—';edDayInf.style.color='#7a7060'}

    if(tv){
      const[h,m]=tv.split(':').map(Number);const v=h*60+m;
      if(v<480){edTimeInf.textContent='⏰ before 8 AM';edTimeInf.style.color='#e88'}
      else if(v>1200){edTimeInf.textContent='⏰ after 8 PM';edTimeInf.style.color='#e88'}
      else{edTimeInf.textContent=`✅ ${f12(tv)}`;edTimeInf.style.color='#8fd4aa'}
    }else{edTimeInf.textContent='8:00 AM – 8:00 PM';edTimeInf.style.color='#7a7060'}

    editStatus.className='edit-status '+(wk?'ws':'os');
    editStatusText.textContent=wk?(tv2?'✅ Working day, office hours':'⚠️ Working day, check time'):'⛔ Non-working day';
    editSub.textContent=bC(dv,tv,emI.value.trim()||'reminder');
  }

  edI.addEventListener('input',updateEditStatus);
  edI.addEventListener('change',updateEditStatus);
  etI.addEventListener('input',updateEditStatus);
  etI.addEventListener('change',updateEditStatus);
  emI.addEventListener('input',updateEditStatus);

  window.saveEdit=function(){
    if(!editingId)return;
    const dv=edI.value,tv=etI.value,msg=emI.value.trim();
    if(!dv){toast('⚠️ Date needed');return}if(!tv){toast('⚠️ Time needed');return}if(!msg){toast('⚠️ Message needed');return}
    const dObj=pD(dv);let h=ld();const idx=h.findIndex(i=>i.id===editingId);if(idx===-1)return;
    h[idx]={...h[idx],date:dv,time:tv,message:msg,working:dObj?iWD(dObj):false,timeValid:iTV(tv)};
    sv(h);toast('✅ Updated');
    /* go back to history */
    scrEdit.classList.remove('open');
    scrHist.classList.remove('pushed');
    editingId=null;
    renderHistory();
  };

  window.copyEditCmd=function(){
    const dv=edI.value,tv=etI.value,msg=emI.value.trim()||'reminder';
    window.copyCmd(bC(dv,tv,msg));
  };

  window.deleteEdit=function(){
    if(!editingId)return;
    const id=editingId;
    confirm2('Delete Reminder?','This reminder will be permanently removed.','🗑️',()=>{
      sv(ld().filter(i=>i.id!==id));
      scrEdit.classList.remove('open');
      scrHist.classList.remove('pushed');
      editingId=null;
      renderHistory();
      toast('🗑️ Deleted');
    });
  };

  window.clearAll=function(){
    const h=ld();if(!h.length){toast('Empty');return}
    confirm2('Clear All?',`${h.length} reminder(s) will be deleted.`,'⚠️',()=>{sv([]);renderHistory();toast('🗑️ Cleared')});
  };

  /* ---- init ---- */
  !function(){
    const n=new Date();
    dI.value=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    tI.value='09:00';mI.value='';
    [dI,tI,mI].forEach(el=>el.addEventListener('input',update));
    tI.addEventListener('change',update);dI.addEventListener('change',update);
    updBadge();update();
  }();
})();
</script>
</body>
</html>
