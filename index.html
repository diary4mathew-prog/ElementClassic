<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remind Studio Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --gold:#f0c27b;--gold-dim:#c79a55;--gold-glow:rgba(240,194,123,.25);
      --green:#6dd4a0;--red:#e88;--bg-deep:#060f0c;
      --glass:rgba(16,16,16,.55);--glass-light:rgba(255,255,255,.06);
      --glass-border:rgba(240,194,123,.16);--text:#f5efe8;--text-dim:#b3a186;
    }
    html,body{height:100%}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg-deep);overflow-x:hidden;
      display:flex;flex-direction:column;align-items:center;
      padding:0 0 100px;position:relative;
    }

    /* ---- bg ---- */
    .bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:orbF 20s ease-in-out infinite alternate}
    .orb-1{width:400px;height:400px;background:radial-gradient(circle,#18453b,transparent 70%);top:-10%;left:-15%;animation-delay:0s}
    .orb-2{width:350px;height:350px;background:radial-gradient(circle,#5b3a12,transparent 70%);bottom:-8%;right:-12%;animation-delay:-7s;animation-duration:24s}
    @keyframes orbF{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-25px) scale(1.06)}100%{transform:translate(-15px,30px) scale(.96)}}
    .noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px}
    .particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
    .particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:pDrift linear infinite}
    @keyframes pDrift{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.5}90%{opacity:.3}100%{opacity:0;transform:translateY(-10vh) scale(1)}}

    /* ---- card ---- */
    .card-wrap{position:relative;z-index:10;width:100%;max-width:500px;padding:12px 14px}
    .card-glow{position:absolute;inset:-2px;border-radius:26px;z-index:-1;
      background:conic-gradient(from 180deg,transparent,rgba(240,194,123,.12),transparent,rgba(240,194,123,.06),transparent);
      animation:gSpin 14s linear infinite;filter:blur(1px)}
    @keyframes gSpin{to{transform:rotate(360deg)}}
    .card{
      position:relative;background:var(--glass);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--glass-border);border-radius:24px;overflow:hidden;
      box-shadow:0 0 0 1px rgba(0,0,0,.3),0 16px 40px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);
    }

    /* ---- header ---- */
    .header{padding:18px 20px 16px;position:relative;overflow:hidden;border-bottom:1px solid var(--glass-border)}
    .header::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,rgba(240,194,123,.08) 0%,transparent 50%)}
    .header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,194,123,.25),transparent)}
    .header-row{position:relative;display:flex;align-items:center;justify-content:space-between}
    .header-left h1{color:#fff;font-size:1.25rem;font-weight:700;letter-spacing:-.3px}
    .header-left .sub{color:var(--text-dim);margin-top:2px;font-size:.72rem;font-weight:400;line-height:1.4}
    .hist-toggle{
      background:var(--glass-light);border:1px solid var(--glass-border);
      color:var(--gold);padding:8px 14px;border-radius:20px;font-size:.74rem;
      cursor:pointer;transition:all .25s;font-family:inherit;font-weight:600;
      display:flex;align-items:center;gap:6px;flex-shrink:0;
    }
    .hist-toggle:active{transform:scale(.95);background:rgba(255,255,255,.1)}
    .hist-count{
      background:linear-gradient(135deg,var(--gold),var(--gold-dim));
      color:#0a1e1a;padding:1px 8px;border-radius:16px;
      font-size:.65rem;font-weight:800;min-width:20px;text-align:center;
    }

    /* ---- content ---- */
    .content{padding:20px}

    /* ---- preview ---- */
    .preview{
      position:relative;border-radius:18px;padding:16px 18px;margin-bottom:20px;
      background:rgba(0,0,0,.25);border:1px solid var(--glass-border);
      transition:border-color .3s,box-shadow .3s;
    }
    .preview::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,194,123,.03),transparent 60%);pointer-events:none}
    .preview:active{border-color:var(--gold)}
    .preview-label{font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:rgba(240,194,123,.4);margin-bottom:8px;font-weight:600}
    .command{
      color:#ffe6b8;font-family:'Consolas','Menlo','Monaco',monospace;
      font-size:.92rem;word-break:break-word;min-height:1.3em;line-height:1.5;
      text-shadow:0 0 15px rgba(240,194,123,.12);position:relative;z-index:1;
    }

    /* ---- form ---- */
    .form-stack{display:flex;flex-direction:column;gap:14px}
    .field{background:var(--glass-light);border-radius:18px;padding:16px;border:1px solid rgba(255,255,255,.04);transition:all .3s;position:relative;overflow:hidden}
    .field::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent)}
    .field:focus-within{border-color:rgba(240,194,123,.2);background:rgba(255,255,255,.08)}
    .field:focus-within label{color:#ffd99a}
    label{color:var(--gold);display:block;margin-bottom:10px;font-size:.68rem;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;transition:color .2s}
    input,textarea{
      width:100%;border:1px solid rgba(255,255,255,.05);border-radius:14px;
      padding:14px 16px;font-size:1rem;background:rgba(0,0,0,.3);color:var(--text);
      outline:none;transition:all .25s;font-family:inherit;
      -webkit-appearance:none;appearance:none;
    }
    input:focus,textarea:focus{
      border-color:var(--gold);background:rgba(0,0,0,.45);
      box-shadow:0 0 0 3px rgba(240,194,123,.07);
    }
    input[type="time"]{color-scheme:dark;cursor:pointer}
    textarea{resize:none;min-height:56px;line-height:1.5}
    .hint{font-size:.66rem;color:#7a7060;margin-top:8px;padding-left:2px;transition:color .2s;line-height:1.4}

    /* ---- actions ---- */
    .action-stack{display:flex;flex-direction:column;gap:10px;margin-top:20px}
    .btn-row{display:flex;gap:10px}
    .btn-primary{
      flex:1;position:relative;border:none;border-radius:16px;padding:16px 20px;
      background:linear-gradient(135deg,var(--gold),var(--gold-dim));
      font-weight:700;font-size:.92rem;color:#0a1e1a;cursor:pointer;
      transition:all .2s;font-family:inherit;overflow:hidden;letter-spacing:.2px;
      box-shadow:0 4px 16px rgba(192,150,70,.2);
    }
    .btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 60%);opacity:0;transition:opacity .2s}
    .btn-primary:active::before{opacity:1}
    .btn-primary:active{transform:scale(.97);box-shadow:0 2px 8px rgba(192,150,70,.15)}
    .btn-secondary{
      flex:1;border:1px solid var(--glass-border);border-radius:16px;padding:15px 16px;
      background:var(--glass-light);font-weight:600;font-size:.92rem;color:var(--gold);
      cursor:pointer;transition:all .2s;font-family:inherit;
    }
    .btn-secondary:active{transform:scale(.97);background:rgba(255,255,255,.1);border-color:var(--gold)}

    .status{
      color:var(--text-dim);font-size:.82rem;padding:4px 0;min-height:1.8rem;
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    }
    .status-badge{
      background:rgba(240,194,123,.08);padding:3px 12px;border-radius:20px;
      font-size:.66rem;color:var(--gold);letter-spacing:.2px;
      border:1px solid rgba(240,194,123,.12);white-space:nowrap;font-weight:600;
    }

    .info-line{
      margin-top:14px;font-size:.68rem;color:#6a6050;
      border-top:1px solid rgba(255,255,255,.04);padding-top:12px;
      display:flex;flex-wrap:wrap;gap:6px 14px;line-height:1.5;
    }

    /* ---- history ---- */
    .history-section{
      border-top:1px solid var(--glass-border);padding:0 20px 24px;
      max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1),padding .4s;
      padding-top:0;position:relative;
    }
    .history-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,194,123,.18),transparent)}
    .history-section.open{max-height:5000px;padding-top:24px}
    .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .history-title{color:var(--gold);font-size:.88rem;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
    .history-title::before{content:'';width:3px;height:16px;background:var(--gold);border-radius:3px}
    .btn-clear-all{
      background:rgba(220,80,80,.06);border:1px solid rgba(220,80,80,.12);
      color:var(--red);padding:6px 14px;border-radius:16px;font-size:.68rem;
      cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s;
    }
    .btn-clear-all:active{background:rgba(220,80,80,.18);transform:scale(.95)}

    .history-list{display:flex;flex-direction:column;gap:8px}
    .history-empty{text-align:center;color:#4a4540;padding:40px 0;font-size:.82rem}

    .hist-item{
      background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04);
      border-radius:18px;padding:16px;display:flex;align-items:center;gap:14px;
      transition:all .25s;animation:hSlide .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
    }
    .hist-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);border-radius:0 3px 3px 0;opacity:0;transition:opacity .25s}
    .hist-item:active{background:rgba(255,255,255,.06)}
    .hist-item.editing{border-color:var(--gold);background:rgba(240,194,123,.03)}
    .hist-item.editing::before{background:var(--gold);opacity:1}
    .hist-item.past{opacity:.45}
    .hist-item.off-day::before{background:var(--red);opacity:1}
    @keyframes hSlide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}

    .hist-indicator{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .hist-indicator.upcoming{background:var(--green);box-shadow:0 0 10px rgba(109,212,160,.35);animation:dotP 2.5s ease-in-out infinite}
    .hist-indicator.past{background:#555}
    .hist-indicator.off{background:var(--red);box-shadow:0 0 8px rgba(238,136,136,.25)}
    @keyframes dotP{0%,100%{box-shadow:0 0 10px rgba(109,212,160,.35)}50%{box-shadow:0 0 18px rgba(109,212,160,.55)}}

    .hist-body{flex:1;min-width:0}
    .hist-cmd{font-family:'Consolas','Menlo','Monaco',monospace;font-size:.8rem;color:#ffe6b8;word-break:break-word;line-height:1.5}
    .hist-meta{font-size:.64rem;color:#6a6050;margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 10px;align-items:center}
    .hist-meta .tag{background:rgba(255,255,255,.04);padding:2px 8px;border-radius:6px;font-weight:500}
    .hist-meta .tag.off-tag{background:rgba(220,80,80,.08);color:var(--red)}
    .hist-meta .tag.work-tag{background:rgba(109,212,160,.06);color:var(--green)}
    .hist-meta .tag.past-tag{color:#666}

    .hist-actions{display:flex;gap:5px;flex-shrink:0}
    .btn-s{
      border:1px solid transparent;border-radius:10px;padding:8px 12px;
      font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;
      font-family:inherit;min-height:38px;min-width:38px;
      display:flex;align-items:center;justify-content:center;
    }
    .btn-s:active{transform:scale(.9)}
    .btn-edit{background:rgba(240,194,123,.08);color:var(--gold);border-color:rgba(240,194,123,.12)}
    .btn-cp{background:rgba(109,212,160,.06);color:var(--green);border-color:rgba(109,212,160,.1)}
    .btn-del{background:rgba(220,80,80,.06);color:var(--red);border-color:rgba(220,80,80,.1)}
    .btn-save{background:rgba(109,212,160,.1);color:var(--green);border-color:rgba(109,212,160,.18)}
    .btn-cancel{background:rgba(255,255,255,.05);color:#999;border-color:rgba(255,255,255,.06)}

    .edit-grid{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .edit-input{
      width:100%;border:1px solid rgba(240,194,123,.15);border-radius:12px;
      padding:12px 14px;font-size:.9rem;background:rgba(0,0,0,.4);color:var(--text);
      outline:none;font-family:inherit;transition:all .25s;-webkit-appearance:none;
    }
    .edit-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,194,123,.07)}
    .edit-input[type="time"]{color-scheme:dark}
    .edit-row{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
    .edit-row .btn-s{padding:10px 20px;font-size:.82rem;border-radius:14px}

    /* ---- toast ---- */
    .toast-box{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;width:calc(100% - 40px);max-width:400px}
    .toast{
      width:100%;background:rgba(16,16,16,.94);backdrop-filter:blur(16px);
      border:1px solid rgba(240,194,123,.2);color:var(--gold);
      padding:14px 20px;border-radius:18px;font-size:.84rem;font-weight:600;
      box-shadow:0 8px 28px rgba(0,0,0,.5);
      animation:tIn .35s cubic-bezier(.4,0,.2,1),tOut .35s ease-in 2s forwards;
      pointer-events:auto;font-family:'Inter',system-ui,sans-serif;
      text-align:center;letter-spacing:.2px;
    }
    @keyframes tIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-10px) scale(.96)}}

    /* ---- modal ---- */
    .modal-ov{
      position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;z-index:9998;
      animation:mFade .2s ease-out;padding:24px;
    }
    @keyframes mFade{from{opacity:0}to{opacity:1}}
    .modal-bx{
      background:rgba(20,20,20,.98);border:1px solid rgba(240,194,123,.18);
      border-radius:24px;padding:32px 28px;max-width:340px;width:100%;text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,.5);
      animation:mPop .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
    }
    .modal-bx::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(240,194,123,.03),transparent 60%);pointer-events:none}
    @keyframes mPop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-ico{font-size:2rem;margin-bottom:12px;display:block}
    .modal-bx h3{color:var(--gold);font-size:1.05rem;margin-bottom:6px;font-weight:700;position:relative}
    .modal-bx p{color:var(--text-dim);font-size:.84rem;margin-bottom:24px;line-height:1.5;position:relative}
    .modal-btns{display:flex;gap:10px;position:relative}
    .modal-btns .btn-s{flex:1;padding:14px;font-size:.88rem;border-radius:16px;justify-content:center}

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(240,194,123,.12);border-radius:8px}
    ::selection{background:rgba(240,194,123,.2);color:#fff}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<div class="noise"></div>
<div class="particles" id="particles"></div>

<div class="card-wrap">
  <div class="card-glow"></div>
  <div class="card">
    <div class="header">
      <div class="header-row">
        <div class="header-left">
          <h1>Remind Studio Pro</h1>
          <div class="sub">⏰ 8 AM – 8 PM · working days only</div>
        </div>
        <button class="hist-toggle" onclick="toggleHistory()" aria-label="Toggle history">
          📜 <span class="hist-count" id="histCount">0</span>
        </button>
      </div>
    </div>

    <div class="content">
      <div class="preview" id="previewBox" onclick="copyCmd()">
        <div class="preview-label">Tap to copy</div>
        <div class="command" id="cmd">!remind YYYY-MM-DD HH:MM reminder</div>
      </div>

      <div class="form-stack">
        <div class="field">
          <label for="d">📅 Date</label>
          <input type="date" id="d">
          <div class="hint"><span id="dayInfo">—</span></div>
        </div>
        <div class="field">
          <label for="t">⏱️ Time</label>
          <input type="time" id="t" step="60" min="08:00" max="20:00">
          <div class="hint"><span id="timeInfo">8:00 AM – 8:00 PM</span></div>
        </div>
        <div class="field">
          <label for="m">💬 Message</label>
          <textarea id="m" rows="2" placeholder="e.g. team sync"></textarea>
        </div>
      </div>

      <div class="action-stack">
        <div class="btn-row">
          <button class="btn-primary" onclick="saveReminder()">💾 Save</button>
          <button class="btn-secondary" onclick="copyCmd()">📋 Copy</button>
        </div>
        <div class="status" id="s">
          <span>✅ Ready</span>
          <span class="status-badge" id="statusBadge">working day</span>
        </div>
      </div>

      <div class="info-line">
        <span>🟢 Mon–Fri + 1st/3rd/5th Sat</span>
        <span>⛔ Sun + 2nd/4th Sat</span>
      </div>
    </div>

    <div class="history-section" id="historySection">
      <div class="history-header">
        <span class="history-title">Saved</span>
        <button class="btn-clear-all" onclick="clearAllHistory()">Clear all</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No reminders yet.</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-box" id="toastBox"></div>

<script>
(function(){
  /* particles */
  !function(){const c=document.getElementById('particles');for(let i=0;i<18;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.width=p.style.height=(1+Math.random()*1.5)+'px';p.style.animationDuration=(14+Math.random()*18)+'s';p.style.animationDelay=(-Math.random()*18)+'s';c.appendChild(p)}}();

  const dI=document.getElementById('d'),tI=document.getElementById('t'),mI=document.getElementById('m');
  const cmd=document.getElementById('cmd'),sEl=document.getElementById('s');
  const dInf=document.getElementById('dayInfo'),tInf=document.getElementById('timeInfo');
  const hSec=document.getElementById('historySection'),hList=document.getElementById('historyList');
  const hCnt=document.getElementById('histCount');
  let hOpen=false,eId=null;
  const K='rsp_v3';

  const ld=()=>{try{return JSON.parse(localStorage.getItem(K))||[]}catch{return[]}};
  const sv=a=>{localStorage.setItem(K,JSON.stringify(a));hCnt.textContent=a.length};

  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const pD=s=>{if(!s)return null;const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])};
  const iWD=d=>{if(!d||isNaN(d))return false;const w=d.getDay();if(!w)return false;if(w===6){const o=Math.ceil(d.getDate()/7);return o!==2&&o!==4}return true};
  const iTV=t=>{if(!t)return false;const[h,m]=t.split(':').map(Number);if(isNaN(h)||isNaN(m))return false;const v=h*60+m;return v>=480&&v<=1200};
  const dL=d=>{if(!d||isNaN(d))return'—';const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];let s='';if(d.getDay()===6){const o=Math.ceil(d.getDate()/7);s=` (${o}${o===1?'st':o===2?'nd':o===3?'rd':'th'} Sat)`}return`${dn[d.getDay()]}, ${d.getDate()} ${d.toLocaleString('default',{month:'short'})}${s}`};
  const f12=t=>{if(!t)return'';const[h,m]=t.split(':');const hr=+h;return`${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`};
  const iUp=(ds,ts)=>{const d=pD(ds);if(!d)return false;const[h,m]=(ts||'00:00').split(':').map(Number);d.setHours(h,m,0,0);return d.getTime()>Date.now()};
  const bC=(d,t,m)=>`!remind ${d||'YYYY-MM-DD'} ${t||'HH:MM'} ${m||'reminder'}`;
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  function toast(t){const c=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast';e.textContent=t;c.appendChild(e);setTimeout(()=>{if(e.parentNode)e.remove()},2600)}

  function confirm2(title,msg,ico,yes){
    const o=document.createElement('div');o.className='modal-ov';
    o.innerHTML=`<div class="modal-bx"><span class="modal-ico">${ico}</span><h3>${title}</h3><p>${msg}</p><div class="modal-btns"><button class="btn-s btn-cancel">Cancel</button><button class="btn-s btn-del">Delete</button></div></div>`;
    document.body.appendChild(o);
    o.querySelector('.btn-cancel').onclick=()=>o.remove();
    o.querySelector('.btn-del').onclick=()=>{o.remove();yes()};
    o.addEventListener('click',e=>{if(e.target===o)o.remove()});
  }

  function update(){
    const dv=dI.value,tv=tI.value,msg=mI.value.trim()||'reminder';
    const dObj=pD(dv);
    if(dObj&&!isNaN(dObj)){const wk=iWD(dObj);dInf.textContent=`${dL(dObj)} · ${wk?'✅ working':'⛔ off'}`;dInf.style.color=wk?'#8fd4aa':'#e88'}
    else{dInf.textContent='—';dInf.style.color='#7a7060'}
    if(tv){const[h,m]=tv.split(':').map(Number);const v=h*60+m;if(v<480){tInf.textContent='⏰ before 8 AM';tInf.style.color='#e88'}else if(v>1200){tInf.textContent='⏰ after 8 PM';tInf.style.color='#e88'}else{tInf.textContent=`✅ ${f12(tv)}`;tInf.style.color='#8fd4aa'}}
    else{tInf.textContent='8:00 AM – 8:00 PM';tInf.style.color='#7a7060'}
    const dOk=dObj&&iWD(dObj),tOk=iTV(tv);
    cmd.textContent=bC(dv,tv,msg);
    if(!dv) sEl.innerHTML='<span>⚠️ Pick a date</span><span class="status-badge">pending</span>';
    else if(!dOk) sEl.innerHTML='<span>⛔ Off day</span><span class="status-badge">off</span>';
    else if(!tOk) sEl.innerHTML='<span>⏰ 8 AM – 8 PM only</span><span class="status-badge">adjust</span>';
    else sEl.innerHTML=`<span>✅ ${dv} ${tv}</span><span class="status-badge">ready</span>`;
  }

  window.copyCmd=function(text){
    const t=text||cmd.textContent;
    navigator.clipboard.writeText(t).then(()=>toast('📋 Copied!')).catch(()=>{
      const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('📋 Copied!')
    });
  };

  window.saveReminder=function(){
    const dv=dI.value,tv=tI.value,msg=mI.value.trim();
    if(!dv){toast('⚠️ Pick a date');return}if(!tv){toast('⚠️ Pick a time');return}if(!msg){toast('⚠️ Type a message');return}
    const dObj=pD(dv);
    const e={id:uid(),date:dv,time:tv,message:msg,working:dObj?iWD(dObj):false,timeValid:iTV(tv),createdAt:new Date().toISOString()};
    const h=ld();h.unshift(e);sv(h);renderH();
    window.copyCmd(bC(dv,tv,msg));toast('💾 Saved & copied!');
    mI.value='';update();
  };

  window.toggleHistory=function(){hOpen=!hOpen;hSec.classList.toggle('open',hOpen);if(hOpen)renderH()};

  function renderH(){
    const h=ld();hCnt.textContent=h.length;
    if(!h.length){hList.innerHTML='<div class="history-empty">No reminders yet.</div>';return}
    hList.innerHTML='';
    h.forEach((item,i)=>{
      const up=iUp(item.date,item.time),wk=item.working,tv=item.timeValid;
      const div=document.createElement('div');
      div.className='hist-item'+(!up?' past':'')+(!wk?' off-day':'');
      div.dataset.id=item.id;div.style.animationDelay=(i*30)+'ms';
      const ic=!wk?'off':(!up?'past':'upcoming');
      const ct=bC(item.date,item.time,item.message);
      const cd=new Date(item.createdAt);
      const cs=cd.toLocaleDateString('default',{month:'short',day:'numeric'})+' '+cd.toLocaleTimeString('default',{hour:'2-digit',minute:'2-digit'});
      div.innerHTML=`
        <div class="hist-indicator ${ic}"></div>
        <div class="hist-body">
          <div class="hist-cmd">${esc(ct)}</div>
          <div class="hist-meta">
            <span class="tag ${wk?'work-tag':'off-tag'}">${wk?'🟢 work':'⛔ off'}</span>
            ${!tv?'<span class="tag off-tag">⏰ hrs</span>':''}
            <span class="tag ${up?'work-tag':'past-tag'}">${up?'upcoming':'past'}</span>
            <span style="opacity:.5">${cs}</span>
          </div>
          <div class="edit-area" style="display:none"></div>
        </div>
        <div class="hist-actions" data-a="${item.id}">
          <button class="btn-s btn-edit" data-e="${item.id}">✏️</button>
          <button class="btn-s btn-cp" data-c="${item.id}">📋</button>
          <button class="btn-s btn-del" data-d="${item.id}">🗑️</button>
        </div>`;
      hList.appendChild(div);
    });
    hList.onclick=onClick;
  }

  function onClick(e){
    const b=e.target.closest('[data-e],[data-c],[data-d],[data-sv],[data-cn]');
    if(!b)return;
    const id=b.dataset.e||b.dataset.c||b.dataset.d||b.dataset.sv||b.dataset.cn;
    if(b.dataset.e)startE(id);
    else if(b.dataset.c){const it=ld().find(i=>i.id===id);if(it)window.copyCmd(bC(it.date,it.time,it.message))}
    else if(b.dataset.d)delI(id);
    else if(b.dataset.sv)saveE(id);
    else if(b.dataset.cn)cancelE(id);
  }

  function delI(id){confirm2('Delete?','This reminder will be removed.','🗑️',()=>{sv(ld().filter(i=>i.id!==id));renderH();toast('🗑️ Deleted')})}

  function startE(id){
    if(eId&&eId!==id)cancelE(eId);
    const item=ld().find(i=>i.id===id);if(!item)return;eId=id;
    const row=hList.querySelector(`.hist-item[data-id="${id}"]`);if(!row)return;
    row.classList.add('editing');row.querySelector(`[data-a="${id}"]`).style.display='none';
    const ea=row.querySelector('.edit-area');ea.style.display='block';
    ea.innerHTML=`
      <div class="edit-grid">
        <input type="date" class="edit-input" id="ed-d-${id}" value="${item.date}">
        <input type="time" class="edit-input" id="ed-t-${id}" value="${item.time}" step="60">
        <input type="text" class="edit-input" id="ed-m-${id}" value="${esc(item.message)}" placeholder="Message">
      </div>
      <div class="edit-row">
        <button class="btn-s btn-cancel" data-cn="${id}">Cancel</button>
        <button class="btn-s btn-save" data-sv="${id}">💾 Save</button>
      </div>`;
  }

  function cancelE(id){
    const row=hList.querySelector(`.hist-item[data-id="${id}"]`);if(!row)return;
    row.classList.remove('editing');const a=row.querySelector(`[data-a="${id}"]`);if(a)a.style.display='flex';
    const ea=row.querySelector('.edit-area');if(ea){ea.style.display='none';ea.innerHTML=''}eId=null;
  }

  function saveE(id){
    const dE=document.getElementById(`ed-d-${id}`),tE=document.getElementById(`ed-t-${id}`),mE=document.getElementById(`ed-m-${id}`);
    if(!dE||!tE||!mE)return;
    const dv=dE.value,tv=tE.value,msg=mE.value.trim();
    if(!dv){toast('⚠️ Date needed');return}if(!tv){toast('⚠️ Time needed');return}if(!msg){toast('⚠️ Message needed');return}
    const dObj=pD(dv);let h=ld();const idx=h.findIndex(i=>i.id===id);if(idx===-1)return;
    h[idx]={...h[idx],date:dv,time:tv,message:msg,working:dObj?iWD(dObj):false,timeValid:iTV(tv)};
    sv(h);eId=null;renderH();toast('✅ Updated');
  }

  window.clearAllHistory=function(){
    const h=ld();if(!h.length){toast('Empty');return}
    confirm2('Clear all?',`${h.length} reminder(s) will be deleted.`,'⚠️',()=>{sv([]);renderH();toast('🗑️ Cleared')});
  };

  !function init(){
    const n=new Date();
    dI.value=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    tI.value='09:00';mI.value='';
    [dI,tI,mI].forEach(el=>el.addEventListener('input',update));
    tI.addEventListener('change',update);dI.addEventListener('change',update);
    hCnt.textContent=ld().length;update();
  }();
})();
</script>
</body>
</html>
